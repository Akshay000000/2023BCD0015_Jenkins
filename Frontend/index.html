<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Student Details</h1>
    <p><strong>Name:</strong> <span id="name"></span></p>
    <p><strong>Roll Number:</strong> <span id="roll"></span></p>
    <p><strong>Register Number:</strong> <span id="reg"></span></p>
</div>

<script>
fetch("http://34.59.138.248:5000/student-details")
    .then(res => res.json())
    .then(data => {
        document.getElementById("name").innerText = data.name;
        document.getElementById("roll").innerText = data.rollNumber;
        document.getElementById("reg").innerText = data.registerNumber;
    })
    .catch(err => console.log(err));
</script>

</body>
</html>
